---
# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"

tasks:
  init:
    desc: Install system dependencies
    cmds:
      - task: mise
      - task: direnv
      - task: create-env-file
      - task: lefthook

  worktree:
    desc: Bootstrap an existing-tooling git worktree
    cmds:
      - task: mise
      - task: create-env-file
      - task: direnv
      - task: lefthook

  direnv:
    desc: Run direnv hooks
    cmd: direnv allow .
    status:
      - "[[ $(direnv status --json | jq '.state.foundRC.allowed') == 0 ]]"
      - "[[ $(direnv status --json | jq '.state.loadedRC.allowed') == 0 ]]"

  create-env-file:
    desc: Create local environment variable file
    cmds:
      - |
        if [ -f .env ]; then
          exit 0
        fi

        if [ -n "${SOURCE_ENV:-}" ]; then
          if [ ! -f "$SOURCE_ENV" ]; then
            printf 'SOURCE_ENV does not exist: %s\n' "$SOURCE_ENV" >&2
            exit 1
          fi
          cp "$SOURCE_ENV" .env
          exit 0
        fi

        source_env=$(
          git -C "{{.ROOT_DIR}}" worktree list --porcelain \
            | awk -v root="{{.ROOT_DIR}}" '
                $1 == "worktree" {
                  path = substr($0, 10)
                  if (path != root && source == "" && system("test -f \"" path "/.env\"") == 0) {
                    source = path "/.env"
                  }
                }
                END {
                  if (source != "") {
                    print source
                  }
                }
              '
        )

        if [ -n "$source_env" ]; then
          cp "$source_env" .env
        else
          cp example.env .env
        fi
    status:
      - test -f .env

  mise:
    desc: Install workstation dependencies
    cmds:
      - mise trust -q -a
      - mise install -q
    preconditions:
      - sh: command -v mise
        msg: Mise is not installed

  lefthook:
    desc: Install Lefthook
    cmds:
      - lefthook install
    preconditions:
      - command -v lefthook
      - test -f lefthook.yaml
