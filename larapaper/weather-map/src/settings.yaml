---
name: Weather Map
strategy: static
refresh_interval: 15
no_screen_padding: "yes"
dark_mode: "no"
framework_version: latest
static_data: '{"image_url":"https://radar.weather.gov/ridge/standard/CONUS_0.gif"}'
custom_fields:
  - keyname: image_url
    field_type: string
    type: string
    name: Image URL
    label: Image URL
    description: Direct URL for a public map image.
    placeholder: https://radar.weather.gov/ridge/standard/CONUS_0.gif
    default: https://radar.weather.gov/ridge/standard/CONUS_0.gif
